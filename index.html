    <style>
        .badge-render {
  font-family: inherit;
}

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar for better UI */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .wetag-pattern {
            background-color: #006496;
            background-image: url("data:image/svg+xml,%3Csvg width='70' height='30' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='17.5' y='15' font-family='Inter, sans-serif' font-weight='900' font-size='7' fill='white' fill-opacity='0.15' text-anchor='middle' dominant-baseline='middle' transform='rotate(-15, 17.5, 15)'%3EWetag%3C/text%3E%3Ctext x='52.5' y='0' font-family='Inter, sans-serif' font-weight='900' font-size='7' fill='white' fill-opacity='0.15' text-anchor='middle' dominant-baseline='middle' transform='rotate(-15, 52.5, 0)'%3EWetag%3C/text%3E%3Ctext x='52.5' y='30' font-family='Inter, sans-serif' font-weight='900' font-size='7' fill='white' fill-opacity='0.15' text-anchor='middle' dominant-baseline='middle' transform='rotate(-15, 52.5, 30)'%3EWetag%3C/text%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        /* Module 2: Security class */
        .badge-render.invalid {
            outline: 4px solid #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4) !important;
        }
